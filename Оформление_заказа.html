    </div>
	
    <div class="col">
    </div>

  <div class="row">
    <div class="col">
     <form class="row g-3 needs-validation" novalidate>         <!-- поля для заполнения -->
  <div class="col-md-12">
    <label for="validationCustom01" class="form-label">Ф.И.О.</label>
    <input type="text" class="form-control" id="validationCustom01" required>
    <div class="valid-feedback">
      Looks good!
    </div>
  </div>
  <div class="mb-3">
    <label for="validationTextarea" class="form-label">Подробное описание заказа</label>
    <textarea class="form-control" id="validationTextarea" required></textarea>
    <div class="valid-feedback">
      Please enter a message in the textarea.
    </div>
  </div>
  <div class="col-md-6">
    <label for="validationDefault01" class="form-label">Срок работы</label>
    <input type="text" class="form-control" id="validationDefault01" required>
  </div>
  <div class="col-md-6">
    <label for="validationDefault02" class="form-label">Размер стены</label>
    <input type="text" class="form-control" id="validationDefault02" required>
  </div>

  <div class="col-md-12">
    <label for="validationCustomUsername" class="form-label">Почта</label>
    <div class="input-group">
      <span class="input-group-text" id="inputGroupPrepend">@</span>
      <input type="text" class="form-control" id="validationCustomUsername" aria-describedby="inputGroupPrepend" required>
      <div class="invalid-feedback">
        Please choose a username.
      </div>
    </div>
  </div>
  <div class="col-md-12">
    <label for="validationCustom03" class="form-label">Адрес</label>
    <input type="text" class="form-control" id="validationCustom03" required>
    <div class="invalid-feedback">
      Please provide a valid city.
    </div>
  </div>
  
  
  <div class="col-12">   <!-- Кнопка-->
 
                          <!-- МОДАЛЬНОЕ ОКНО-->
	<button type=button class="open_modal" href="#open" class="btn btn-outline">ОТПРАВИТЬ</button>
        <div id="modal" class="modal bounceIn">
          <div id="close_modal">+</div>
             <div class="modal_txt"> 
			          <p>ВАШ ЗАКАЗ ПРИНЯТ.</p> 
		              <p>ЖДИТЕ ЗВОНКА СОТРУДНИКА.</p>
					  
				 <div class="modal_i">

				     <img src="img/80.png" alt="80"  width="110" height="110">
				</div>
			  </div>  
		     </div>

  </div>   <!-- class col-12 -->
